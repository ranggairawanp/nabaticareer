<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Apply - Nabati Careers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="nabati_career_data.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface:#fff;--surface-2:#f7f8fa;--surface-3:#eef1f5;
  --border:#e6e9ef;--border-strong:#d4dae3;
  --ink:#171a1f;--ink-2:#525a67;--ink-3:#8b94a3;--n400:#aeb6c2;
  --red:#e1231b;--primary:#e1231b;--primary-700:#b8141a;--primary-600:#cf1a18;--primary-tint:#fceceb;--primary-tint-2:#f9dad7;
  --accent:#1f242c;--success:#1f9d57;--success-tint:#e6f5ec;--warning:#c47d10;--warning-tint:#faeed4;--info:#2563c9;--info-tint:#e7effb;
  --font-display:'Schibsted Grotesk','Noto Sans',system-ui,sans-serif;
  --font-ui:'Geist','Noto Sans',system-ui,sans-serif;
  --font-mono:'Geist Mono','JetBrains Mono',ui-monospace,monospace;
  --radius:13px;--r-sm:9px;--r-md:13px;--r-lg:18px;
  --e1:0 1px 2px rgba(23,26,31,.05),0 1px 3px rgba(23,26,31,.04);
  --e2:0 6px 16px -6px rgba(23,26,31,.14),0 2px 6px rgba(23,26,31,.05);
  --e3:0 18px 40px -16px rgba(23,26,31,.22);
}
html{scroll-behavior:smooth}
body{font-family:var(--font-ui);background:var(--surface-2);color:var(--ink);min-height:100vh;font-size:15px;line-height:1.55;-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);letter-spacing:-.02em;line-height:1.12;margin:0}
.num{font-family:var(--font-mono);font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}
::selection{background:var(--primary);color:#fff}

/* TRUST STRIP */
.trust{background:var(--surface-3);border-bottom:1px solid var(--border)}
.trust-inner{max-width:820px;margin:0 auto;padding:6px 24px;display:flex;align-items:center;gap:8px;font-size:.72rem;color:var(--ink-3);line-height:1.4}
.trust svg{flex-shrink:0;color:var(--success)}
.trust b{color:var(--ink-2);font-weight:600}
.trust a{color:var(--primary);font-weight:600}

/* APPBAR */
.appbar{background:rgba(255,255,255,.9);backdrop-filter:saturate(1.4) blur(8px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100}
.nav-inner{max-width:820px;margin:0 auto;padding:0 24px;height:58px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.brand{display:flex;align-items:center;gap:9px;text-decoration:none}
.brand img{height:24px;display:block}
.brand-name{font-family:var(--font-display);font-weight:800;font-size:.95rem;color:var(--ink);line-height:1}
.brand-sub{display:block;font-size:.6rem;color:var(--ink-3);font-weight:400;letter-spacing:.02em;margin-top:1px}
.back-link{display:flex;align-items:center;gap:6px;font-size:.82rem;font-weight:500;color:var(--ink-3);cursor:pointer;padding:7px 11px;border-radius:var(--r-sm);transition:.14s}
.back-link:hover{color:var(--ink);background:var(--surface-2)}

/* PAGE */
.page{max-width:820px;margin:0 auto;padding:24px 24px 96px}

/* ROLE CONTEXT CARD (sticky) */
.role-bar{position:sticky;top:58px;z-index:80;background:var(--surface);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e2);padding:16px 20px;margin-bottom:22px;display:flex;align-items:center;gap:16px}
.role-mark{width:42px;height:42px;border-radius:50% 50% 50% 8px;background:var(--primary-tint);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.role-mark svg{width:20px;height:20px;color:var(--primary)}
.role-main{flex:1;min-width:0}
.role-eyebrow{font-family:var(--font-mono);font-size:.62rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--primary-700);margin-bottom:3px}
.role-title{font-family:var(--font-display);font-size:1.12rem;font-weight:700;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.role-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:7px}
.chip{display:inline-flex;align-items:center;gap:5px;padding:3px 9px;border-radius:999px;font-size:.72rem;font-weight:600;background:var(--surface-2);border:1px solid var(--border);color:var(--ink-2);white-space:nowrap}
.chip svg{width:12px;height:12px;color:var(--ink-3)}
.chip-grade{background:var(--primary-tint);border-color:var(--primary-tint-2);color:var(--primary-700);font-family:var(--font-mono)}
.role-right{flex-shrink:0;text-align:right}
.role-grade{font-family:var(--font-mono);font-size:1.05rem;font-weight:600;color:var(--primary-700);background:var(--primary-tint);border:1px solid var(--primary-tint-2);border-radius:var(--r-sm);padding:6px 12px;display:inline-block}
.role-grade small{display:block;font-family:var(--font-ui);font-size:.58rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-3);margin-top:2px}

/* STEPPER */
.stepper-wrap{margin-bottom:24px}
.stepper-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.stepper-count{font-family:var(--font-mono);font-size:.72rem;font-weight:600;color:var(--ink-2);letter-spacing:.02em}
.stepper-count b{color:var(--primary-700)}
.stepper-pct{font-family:var(--font-mono);font-size:.72rem;color:var(--ink-3)}
.stepper{display:flex;align-items:flex-start;gap:0;overflow-x:auto;padding-bottom:6px;scrollbar-width:thin}
.step{display:flex;align-items:flex-start;flex-shrink:0}
.step-inner{display:flex;flex-direction:column;align-items:center;width:64px}
.step-dot{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-size:.78rem;font-weight:600;border:2px solid var(--border-strong);background:#fff;color:var(--ink-3);transition:all .25s;position:relative}
.step-dot.done{background:var(--primary);border-color:var(--primary);color:#fff;box-shadow:0 2px 8px -2px rgba(225,35,27,.45)}
.step-dot.active{border-color:var(--primary);color:var(--primary);box-shadow:0 0 0 4px var(--primary-tint)}
.step-dot svg{width:14px;height:14px}
.step-label{font-size:.66rem;color:var(--ink-3);margin-top:7px;text-align:center;line-height:1.25;font-weight:500}
.step-label.active{color:var(--ink);font-weight:600}
.step-label.done{color:var(--ink-2)}
.step-line{height:2px;width:30px;background:var(--border-strong);flex-shrink:0;margin-top:14px;border-radius:2px;transition:background .25s}
.step-line.done{background:var(--primary)}

/* FORM CARD */
.form-card{background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);padding:30px 30px;box-shadow:var(--e2)}
.form-card h3{font-family:var(--font-display);font-weight:700;font-size:1.25rem;color:var(--ink);margin-bottom:5px}
.form-card .sub{font-size:.86rem;color:var(--ink-3);margin-bottom:24px;line-height:1.55}
.field{margin-bottom:18px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink-2);margin-bottom:7px}
.field label .req,.req{color:var(--red)}
.field input,.field select,.field textarea{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-ui);font-size:.88rem;color:var(--ink);background:#fff;transition:border-color .15s,box-shadow .15s}
.field input::placeholder,.field textarea::placeholder{color:var(--n400)}
.field input:hover,.field select:hover,.field textarea:hover{border-color:var(--border-strong)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint)}
.field textarea{resize:vertical;min-height:92px;line-height:1.55}
.field .hint{font-size:.74rem;color:var(--ink-3);margin-top:5px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.three{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}

/* SECTION HEADING */
.sec-label{display:flex;align-items:center;gap:8px;font-size:.68rem;font-weight:700;letter-spacing:.08em;color:var(--primary-700);text-transform:uppercase;margin:26px 0 14px}
.sec-label::before{content:"";width:4px;height:13px;border-radius:2px;background:var(--primary);flex-shrink:0}

/* EXPERIENCE / REPEATABLE BLOCK */
.exp-block{border:1px solid var(--border);border-radius:var(--r-md);padding:18px;margin-bottom:14px;position:relative;background:var(--surface-2)}
.exp-block .field input,.exp-block .field select,.exp-block .field textarea{background:#fff}
.exp-block .remove-btn{position:absolute;top:12px;right:14px;width:24px;height:24px;border-radius:50%;background:#fff;border:1px solid var(--border);color:var(--ink-3);font-size:1rem;line-height:1;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.14s}
.exp-block .remove-btn:hover{border-color:var(--red);color:var(--red);background:var(--primary-tint)}
.add-btn{display:flex;align-items:center;justify-content:center;gap:7px;border:1.5px dashed var(--border-strong);border-radius:var(--r-md);padding:11px 16px;width:100%;background:none;font-family:var(--font-ui);font-size:.84rem;font-weight:600;color:var(--ink-3);cursor:pointer;margin-top:4px;transition:.14s}
.add-btn:hover{border-color:var(--primary);color:var(--primary);background:var(--primary-tint)}

/* ORG STRUCTURE */
.org-tree{padding:20px;background:var(--surface-2);border-radius:var(--r-md);border:1px solid var(--border)}
.org-row{display:flex;gap:10px;align-items:center;margin-bottom:10px}
.org-label{font-size:.74rem;font-weight:600;color:var(--ink-3);min-width:118px;flex-shrink:0}
.org-field{flex:1;display:flex;gap:8px}
.org-field input{flex:1;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-size:.82rem;font-family:var(--font-ui);color:var(--ink);background:#fff;transition:border-color .15s,box-shadow .15s}
.org-field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint)}
.org-self{background:var(--primary-tint);border:1.5px solid var(--primary);border-radius:var(--r-sm);padding:9px 12px;font-size:.85rem;font-weight:700;color:var(--primary-700);flex:1;font-family:var(--font-display)}

/* INFO BANNER (LinkedIn / saved) */
.li-banner{background:var(--info-tint);border:1px solid #bfdbfe;border-radius:var(--r-md);padding:13px 16px;font-size:.82rem;color:#1e40af;display:flex;align-items:center;gap:10px;margin-bottom:20px;line-height:1.5}

/* CONSENT */
.check-row{display:flex;align-items:flex-start;gap:11px;margin-bottom:12px}
.check-row input[type=checkbox]{width:17px;height:17px;flex-shrink:0;margin-top:2px;accent-color:var(--red);cursor:pointer}
.check-row label{font-size:.82rem;color:var(--ink-2);line-height:1.55}
.check-row label a{color:var(--red);font-weight:600}
.consent-card{align-items:flex-start;padding:15px 16px;background:#fff;border:1.5px solid var(--border);border-radius:var(--r-md);margin-bottom:10px;transition:border-color .15s,background .15s}
.consent-card:has(input:checked){border-color:var(--primary);background:var(--primary-tint)}
.consent-card.optional{background:var(--surface-2);border-width:1px}
.consent-card.optional:has(input:checked){border-color:var(--border-strong);background:var(--surface-3)}

/* SUMMARY */
.summary-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:6px 18px;margin-bottom:24px}
.summary-row{display:flex;justify-content:space-between;gap:16px;padding:11px 0;border-bottom:1px solid var(--border);font-size:.85rem}
.summary-row:last-child{border-bottom:none}
.summary-key{color:var(--ink-3);font-size:.8rem;flex-shrink:0}
.summary-val{color:var(--ink);font-weight:500;text-align:right}

/* PRIVACY NOTICE */
.priv-notice{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--r-md);padding:18px 20px;margin-bottom:20px;font-size:.82rem;color:var(--ink-2);line-height:1.7}
.priv-notice .ph{font-family:var(--font-display);font-weight:700;color:var(--ink);margin-bottom:10px;font-size:.92rem}

/* ACTIONS */
.action-bar{display:flex;justify-content:space-between;align-items:center;margin-top:28px;gap:12px}
.btn-back{padding:11px 22px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);background:#fff;font-family:var(--font-ui);font-size:.88rem;font-weight:600;color:var(--ink);cursor:pointer;transition:.14s}
.btn-back:hover{background:var(--surface-2);border-color:var(--ink-3)}
.btn-next{display:inline-flex;align-items:center;gap:8px;padding:12px 26px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:.92rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px -2px rgba(225,35,27,.4);transition:.16s}
.btn-next:hover{background:var(--primary-700);transform:translateY(-1px);box-shadow:0 6px 16px -4px rgba(225,35,27,.5)}
.btn-next:disabled{opacity:.55;cursor:not-allowed;transform:none;box-shadow:none}
.btn-next svg{width:16px;height:16px}

/* SUCCESS */
.success-screen{text-align:center;padding:52px 24px;background:#fff;border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--e2)}
.success-screen .icon{width:68px;height:68px;background:var(--success-tint);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 22px}
.success-screen h2{font-family:var(--font-display);font-weight:800;font-size:1.6rem;color:var(--ink);margin-bottom:10px}
.success-screen p{color:var(--ink-2);font-size:.9rem;margin-bottom:8px;line-height:1.55}
.app-id{font-family:var(--font-mono);font-size:1.15rem;font-weight:600;color:var(--ink);background:var(--surface-3);border:1px solid var(--border);padding:11px 22px;border-radius:var(--r-sm);display:inline-block;margin:14px 0 24px;letter-spacing:.06em}
.social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 16px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);background:#fff;font-family:var(--font-ui);font-size:.9rem;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s}
.social-btn:hover{border-color:var(--ink-3);box-shadow:var(--e1)}
.social-btn svg{flex-shrink:0}
.btn-outline{padding:12px 24px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);background:#fff;font-family:var(--font-ui);font-size:.88rem;font-weight:600;color:var(--ink);cursor:pointer;text-decoration:none;display:inline-block;transition:.14s}
.btn-outline:hover{background:var(--surface-2);border-color:var(--ink-3)}

/* UPLOAD */
.upload-area{border:2px dashed var(--border-strong);border-radius:var(--r-md);padding:30px;text-align:center;cursor:pointer;transition:.15s;background:var(--surface-2)}
.upload-area:hover{border-color:var(--primary);background:var(--primary-tint)}
.upload-area .up-ic{width:40px;height:40px;border-radius:50%;background:#fff;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 10px}
.upload-area .up-ic svg{width:20px;height:20px;color:var(--primary)}
.upload-area .up-main{font-size:.88rem;font-weight:600;color:var(--ink)}
.upload-area p{font-size:.85rem;color:var(--ink-3);margin-top:4px}
.uploaded-file{display:flex;align-items:center;gap:10px;background:var(--success-tint);border:1px solid #bbf7d0;padding:11px 14px;border-radius:var(--r-sm);font-size:.82rem;color:#166534;margin-top:10px}

@media(max-width:600px){
  .two,.three{grid-template-columns:1fr}
  .action-bar{flex-direction:column-reverse}
  .btn-back,.btn-next{width:100%;justify-content:center;text-align:center}
  .role-bar{flex-wrap:wrap;gap:12px;top:58px}
  .role-main{order:2;flex:1 1 100%}
  .role-right{order:3}
  .role-title{white-space:normal}
  .form-card{padding:22px 18px}
  .summary-row{flex-direction:column;align-items:flex-start;gap:3px;padding:12px 0}
  .summary-val{text-align:left;font-size:.9rem}
  .summary-key{font-size:.72rem;text-transform:uppercase;letter-spacing:.04em}
  .stepper-head{flex-direction:column;align-items:flex-start;gap:3px}
}

.trust{display:none!important}
</style>
</head>

  function renderStepper(){

        +'</div>'
        +(i < STEP_LABELS.length-1 ? '<div class="step-line'+(done?' done':'')+'"></div>' : '')
        +'</div>';
    });
    document.getElementById('stepper').innerHTML = html;
    var pct = Math.round((step)/(STEP_LABELS.length-1)*100);

      try{
        var o=JSON.parse(localStorage.getItem('nabApps')||'{}');
        o[appNo]={ role:[roleTitle,roleTitle], email:(flk.email||''), stage:0, when:when, consent:true, job_id:jobId };
        localStorage.setItem('nabApps', JSON.stringify(o));
      }catch(e){}
      var profileToSave = Object.assign({}, flk); delete profileToSave._from_saved;
      try{ var nc=JSON.parse(localStorage.getItem('nabCandidate')||'{}'); nc.profile=profileToSave; if(!nc.name)nc.name=flk.full_name||nc.name; if(!nc.email)nc.email=flk.email||nc.email; localStorage.setItem('nabCandidate', JSON.stringify(nc)); }catch(e){}
      try{ _setLocal('nabati_candidate_profile', profileToSave); }catch(e){}
      renderSuccess(appNo);
    })();
  };

  function renderSuccess(appId){
    document.getElementById('stepperWrap').style.display='none';
    document.getElementById('jobBanner').style.display='none';
    document.getElementById('formContent').innerHTML =
      '<div class="success-screen">'
      +'<div class="icon"><svg width="28" height="28" fill="none" stroke="#16a34a" stroke-width="2.5" viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>'
      +'<h2>Application submitted!</h2>'
      +'<p>Thank you '+(flk.full_name||user.name)+'. We have received your application for</p>'
      +'<p><b>'+(currentJob?currentJob.title:'')+'</b> at Nabati Group.</p>'
      +'<div class="app-id">'+appId+'</div>'
      +'<p style="margin-bottom:8px">Save this number to track your application status.</p>'
      +'<p style="font-size:.8rem;color:var(--ink-3);margin-bottom:24px">Your profile has been saved. Next time you apply to a Nabati role, your details will be pre-filled automatically.</p>'
      +'<div style="display:flex;gap:12px;justify-content:center;flex-wrap:wrap">'
      +'<a class="btn-outline" href="index.html">Browse more roles</a>'
      +'<a class="btn-next" href="index.html?view=account" style="padding:11px 24px;text-decoration:none">Track my application</a>'
      +'</div>'
      +'</div>';
  }
})();
</script>
</body>
</html>
