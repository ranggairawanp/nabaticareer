<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin - Nabati Career Site</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="nabati_career_data.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#E1231B;--ink:#1F242C;--ink-2:#4b5563;--ink-3:#6b7280;
  --surface:#fff;--surface-2:#f7f8fa;--border:#e5e7eb;--border-strong:#d1d5db;
  --font-display:'Schibsted Grotesk',system-ui,sans-serif;
  --font-ui:'Geist',system-ui,sans-serif;--font-mono:'Geist Mono',monospace;
  --sidebar:240px;
}
body{font-family:var(--font-ui);background:var(--surface-2);color:var(--ink);display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:#1F242C;color:#fff;display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:50}
.sb-brand{padding:20px 18px 16px;border-bottom:1px solid rgba(255,255,255,.08)}
.sb-logo{display:flex;align-items:center;gap:8px}
.sb-mark{width:28px;height:28px;background:var(--red);border-radius:50% 50% 50% 6px;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-weight:800;font-size:11px;color:#fff}
.sb-name{font-family:var(--font-display);font-weight:700;font-size:.9rem;color:#fff}
.sb-sub{font-size:.72rem;color:rgba(255,255,255,.45);margin-top:2px}
.sb-nav{flex:1;padding:16px 0;overflow-y:auto}
.nav-s{font-size:.65rem;font-weight:700;letter-spacing:.1em;color:rgba(255,255,255,.35);text-transform:uppercase;padding:16px 18px 6px}
.nav-i{display:flex;align-items:center;gap:10px;padding:9px 18px;font-size:.85rem;color:rgba(255,255,255,.7);cursor:pointer;transition:all .15s;border-left:3px solid transparent}
.nav-i:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-i.active{background:rgba(225,35,27,.15);color:#fff;border-left-color:var(--red)}
.sb-foot{padding:16px 18px;border-top:1px solid rgba(255,255,255,.08);font-size:.78rem;color:rgba(255,255,255,.45)}
.main{margin-left:var(--sidebar);flex:1}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:0 28px;height:56px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:40}
.topbar h1{font-family:var(--font-display);font-weight:700;font-size:1.05rem}
.topbar-right{display:flex;gap:10px;align-items:center}
.content{padding:28px}
/* STAT */
.stat-row{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px}
.stat-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:18px 20px}
.stat-label{font-size:.75rem;color:var(--ink-3);margin-bottom:8px}
.stat-val{font-family:var(--font-mono);font-size:1.6rem;font-weight:700}
/* JOB TABLE */
.card{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;margin-bottom:20px}
.card-head{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
.card-head h2{font-family:var(--font-display);font-weight:700;font-size:.95rem}
table{width:100%;border-collapse:collapse}
th{padding:10px 16px;text-align:left;font-size:.73rem;font-weight:600;color:var(--ink-3);background:var(--surface-2);border-bottom:1px solid var(--border)}
td{padding:13px 16px;font-size:.83rem;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--surface-2)}
/* STATUS BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:.72rem;font-weight:600}
.badge-green{background:#f0fdf4;color:#16a34a}
.badge-amber{background:#fff7ed;color:#c47d10}
.badge-gray{background:var(--surface-2);color:var(--ink-3)}
.badge-red{background:#fff1f0;color:#c0392b}
/* BUTTONS */
.btn{padding:8px 16px;border-radius:8px;font-family:var(--font-ui);font-size:.82rem;font-weight:600;cursor:pointer;border:none;transition:opacity .15s}
.btn-red{background:var(--red);color:#fff}.btn-red:hover{opacity:.9}
.btn-ghost{background:#fff;color:var(--ink);border:1.5px solid var(--border)}.btn-ghost:hover{background:var(--surface-2)}
.btn-sm{padding:5px 12px;font-size:.75rem}
/* MODAL */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:300;display:none;align-items:center;justify-content:center;padding:24px}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:16px;width:100%;max-width:620px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.modal-head{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-head h3{font-family:var(--font-display);font-weight:700;font-size:1rem}
.close{width:30px;height:30px;border:none;background:var(--surface-2);border-radius:7px;cursor:pointer;font-size:1rem;color:var(--ink-3)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-foot{padding:16px 24px;border-top:1px solid var(--border);display:flex;gap:10px;justify-content:flex-end;flex-shrink:0}
.field{margin-bottom:16px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink-2);margin-bottom:5px}
.field label .req{color:var(--red)}
.field input,.field select,.field textarea{width:100%;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font-ui);font-size:.85rem;color:var(--ink)}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--red)}
.field textarea{resize:vertical;min-height:100px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.sec-head{font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--red);margin:18px 0 10px}
/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--ink);color:#fff;padding:12px 20px;border-radius:10px;font-size:.85rem;font-weight:500;z-index:999;opacity:0;transform:translateY(8px);transition:all .2s;pointer-events:none}
.toast.show{opacity:1;transform:translateY(0)}
@media(max-width:900px){.sidebar{display:none}.main{margin-left:0}.stat-row{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<div class="sidebar">
  <div class="sb-brand">
    <div class="sb-logo">
      <div class="sb-mark">N</div>
      <div><div class="sb-name">Career Admin</div><div class="sb-sub">Nabati Group</div></div>
    </div>
  </div>
  <div class="sb-nav">
    <div class="nav-s">Content</div>
    <div class="nav-i active" onclick="setView('dashboard')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
      Dashboard
    </div>
    <div class="nav-i" onclick="setView('jobs')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      Job Postings
    </div>
    <div class="nav-i" onclick="setView('candidates')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/></svg>
      All Applications
    </div>
    <div class="nav-s">Site Config</div>
    <div class="nav-i" onclick="setView('settings')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M12 1v4M12 19v4M4.22 4.22l2.83 2.83M16.95 16.95l2.83 2.83M1 12h4M19 12h4M4.22 19.78l2.83-2.83M16.95 7.05l2.83-2.83"/></svg>
      Site Settings
    </div>
    <div class="nav-s">Links</div>
    <div class="nav-i" onclick="window.open('recruiter.html','_blank')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Recruiter Console
    </div>
    <div class="nav-i" onclick="window.open('index.html','_blank')">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Career Site (Live)
    </div>
  </div>
  <div class="sb-foot">One HCMS v1.0 &middot; TA Module</div>
</div>

<div class="main">
  <div class="topbar">
    <h1 id="viewTitle">Job Postings</h1>
    <div class="topbar-right">
      <button class="btn btn-red" onclick="openJobModal(null)">+ New Job Posting</button>
    </div>
  </div>
  <div class="content" id="mainContent"></div>
</div>

<!-- JOB MODAL -->
<div class="modal-bg" id="jobModal">
  <div class="modal">
    <div class="modal-head">
      <h3 id="modalTitle">New Job Posting</h3>
      <button class="close" onclick="closeModal()">&times;</button>
    </div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-ghost" onclick="saveJob('draft')">Save as Draft</button>
      <button class="btn btn-red" onclick="saveJob('open')">Publish</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
(function(){
  var view = 'dashboard';
  var allJobs = [];
  var allCandidates = [];
  var editingJob = null;

  // Load
  apiGetJobs({}, function(err, jobs){
    allJobs = (jobs||[]).concat(MOCK_JOBS.filter(function(j){return j.status==='draft';}));
    apiGetCandidates({}, function(e2, cands){
      allCandidates = cands||[];
      renderView();
    });
  });

  window.setView = function(v){
    view = v;
    document.querySelectorAll('.nav-i').forEach(function(el){el.classList.remove('active')});
    var titles={dashboard:'Dashboard',jobs:'Job Postings',candidates:'All Applications',settings:'Site Settings'};
    document.getElementById('viewTitle').textContent = titles[v]||v;
    renderView();
  };

  function renderView(){
    if(view==='dashboard') renderAdminDashboard();
    else if(view==='jobs') renderJobs();
    else if(view==='candidates') renderCandidates();
    else if(view==='settings') renderSettings();
  }

  // ─── STATS ───
  function statsHTML(){
    var open = allJobs.filter(function(j){return j.status==='open';}).length;
    var draft = allJobs.filter(function(j){return j.status==='draft';}).length;
    var totalCands = allCandidates.length;
    var totalHC = allJobs.reduce(function(a,j){return a+(j.headcount||0);},0);
    return '<div class="stat-row">'
      + scard('Open Postings', open)
      + scard('Draft Postings', draft)
      + scard('Total Applicants', totalCands)
      + scard('Total Headcount', totalHC)
      +'</div>';
  }
  function scard(l,v){ return '<div class="stat-card"><div class="stat-label">'+l+'</div><div class="stat-val">'+v+'</div></div>'; }

  // ─── ADMIN DASHBOARD ───
  function renderAdminDashboard(){
    var open = allJobs.filter(function(j){return j.status==='open';}).length;
    var draft = allJobs.filter(function(j){return j.status==='draft';}).length;
    var total = allCandidates.length;
    var termStages = ['withdrawn','closed','not_passed_screening','not_passed_ta_iv','not_passed_assess','not_passed_user_iv','offer_declined'];
    var active = allCandidates.filter(function(c){return termStages.indexOf(c.stage)<0&&c.stage!=='accepted'&&c.stage!=='onboarding';}).length;
    var inOffer = allCandidates.filter(function(c){return ['offering_prep','mcu_process','mcu_sent','ol_reviewed','ol_sent'].indexOf(c.stage)>=0;}).length;
    var accepted = allCandidates.filter(function(c){return c.stage==='accepted'||c.stage==='onboarding';}).length;
    var flkPending = allCandidates.filter(function(c){return !c.flk_complete;}).length;

    // Funnel
    var phases = [
      {lb:'Applied',      n:allCandidates.filter(function(c){return ['submitted','under_review'].indexOf(c.stage)>=0;}).length, cl:'#2563c9'},
      {lb:'TA Interview', n:allCandidates.filter(function(c){return ['ta_iv_scheduled','ta_iv_done'].indexOf(c.stage)>=0;}).length, cl:'#c47d10'},
      {lb:'Assessment',   n:allCandidates.filter(function(c){return ['assessment_sent','assessment_done','business_case'].indexOf(c.stage)>=0;}).length, cl:'#6d4aa8'},
      {lb:'User Interview',n:allCandidates.filter(function(c){return ['user_iv_scheduled','user_iv_done'].indexOf(c.stage)>=0;}).length, cl:'#0e8a8a'},
      {lb:'Offer Stage',  n:inOffer, cl:'#1f9d57'},
      {lb:'Accepted',     n:accepted, cl:'#1f242c'},
    ];
    var maxP = Math.max.apply(null,phases.map(function(p){return p.n;}))||1;

    // Per-recruiter
    var recStats = Object.keys(MOCK_RECRUITERS).map(function(rid){
      var r=MOCK_RECRUITERS[rid], rc=allCandidates.filter(function(c){return c.recruiter_id===rid;});
      return {nm:r.name,rl:r.role,tot:rc.length,
        act:rc.filter(function(c){return termStages.indexOf(c.stage)<0&&c.stage!=='accepted'&&c.stage!=='onboarding';}).length,
        off:rc.filter(function(c){return ['offering_prep','mcu_process','mcu_sent','ol_reviewed','ol_sent'].indexOf(c.stage)>=0;}).length,
        hir:rc.filter(function(c){return c.stage==='accepted'||c.stage==='onboarding';}).length
      };
    });

    var h = statsHTML()
      +'<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px">'
      +'<div class="card" style="overflow:visible"><div class="card-head"><h2>Recruitment Funnel</h2></div><div style="padding:16px">';
    phases.forEach(function(p){
      var w=Math.max(Math.round(p.n/maxP*100),p.n>0?8:0);
      h+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:7px">'
        +'<div style="font-size:.72rem;color:var(--ink-2);min-width:130px">'+p.lb+'</div>'
        +'<div style="flex:1;background:var(--surface-2);border-radius:999px;height:18px;overflow:hidden">'
        +'<div style="height:100%;border-radius:999px;width:'+w+'%;background:'+p.cl+';display:flex;align-items:center;justify-content:flex-end;padding-right:6px">'
        +'<span style="font-family:var(--font-mono);font-size:.65rem;font-weight:700;color:#fff">'+p.n+'</span>'
        +'</div></div>'
        +'<div style="font-family:var(--font-mono);font-size:.68rem;color:var(--ink-3);min-width:24px;text-align:right">'+p.n+'</div>'
        +'</div>';
    });
    h+='</div></div>';

    // Stage distribution list
    h+='<div class="card" style="overflow:visible"><div class="card-head"><h2>Active by Stage</h2></div><div style="padding:12px 16px">';
    ['submitted','under_review','ta_iv_scheduled','ta_iv_done','assessment_sent','assessment_done','user_iv_scheduled','user_iv_done','offering_prep','mcu_process','ol_reviewed','ol_sent'].forEach(function(sid){
      var st=getStageInfo(sid), cnt2=allCandidates.filter(function(c){return c.stage===sid;}).length;
      if(cnt2===0) return;
      h+='<div style="display:flex;align-items:center;gap:7px;padding:5px 0;border-bottom:1px solid var(--border)">'
        +'<div style="width:7px;height:7px;border-radius:50%;background:'+st.color+';flex-shrink:0"></div>'
        +'<span style="font-size:.75rem;color:var(--ink-2);flex:1">'+st.label+'</span>'
        +'<span style="font-family:var(--font-mono);font-size:.78rem;font-weight:700">'+cnt2+'</span>'
        +'</div>';
    });
    h+='</div></div></div>';

    // Team performance
    h+='<div class="card"><div class="card-head"><h2>Team Performance</h2>'
      +'<button class="btn btn-ghost btn-sm" onclick="window.open(\'recruiter.html\',\'_blank\')">Open TA Console</button></div>'
      +'<table><thead><tr><th>Recruiter</th><th>Role</th><th>Total</th><th>Active</th><th>In Offer</th><th>Accepted</th><th>Rate</th></tr></thead><tbody>';
    recStats.forEach(function(r){
      var cv=r.tot?Math.round(r.hir/r.tot*100):0;
      h+='<tr><td style="font-weight:600">'+esc(r.nm)+'</td><td style="font-size:.73rem;color:var(--ink-3)">'+r.rl+'</td>'
        +'<td style="font-family:var(--font-mono)">'+r.tot+'</td>'
        +'<td style="font-family:var(--font-mono)">'+r.act+'</td>'
        +'<td style="font-family:var(--font-mono)">'+r.off+'</td>'
        +'<td style="font-family:var(--font-mono);color:#16a34a;font-weight:600">'+r.hir+'</td>'
        +'<td><div style="display:flex;align-items:center;gap:6px"><div style="flex:1;background:var(--surface-2);border-radius:999px;height:5px;overflow:hidden"><div style="height:100%;background:var(--red);border-radius:999px;width:'+cv+'%"></div></div><span style="font-family:var(--font-mono);font-size:.7rem">'+cv+'%</span></div></td>'
        +'</tr>';
    });
    h+='</tbody></table></div>';
    document.getElementById('mainContent').innerHTML = h;
  }

  // ─── JOBS ───
  function renderJobs(){
    var rows = allJobs.map(function(j){
      var ccount = allCandidates.filter(function(c){return c.job_id===j.id;}).length;
      var badge = j.status==='open'?'badge-green':j.status==='draft'?'badge-amber':'badge-gray';
      var rec = MOCK_RECRUITERS[j.recruiter_id];
      return '<tr>'
        +'<td><div style="font-weight:600">'+esc(j.title)+'</div>'
        +'<div style="font-size:.73rem;color:var(--ink-3);margin-top:2px;font-family:var(--font-mono)">'+j.id+' &middot; MPN: '+esc(j.mpn_id||'-')+'</div></td>'
        +'<td>'+esc(j.department)+'</td>'
        +'<td>'+esc(j.location)+'</td>'
        +'<td style="font-family:var(--font-mono)">'+j.headcount+'</td>'
        +'<td><span class="badge '+badge+'">'+j.status.charAt(0).toUpperCase()+j.status.slice(1)+'</span></td>'
        +'<td style="font-size:.78rem;color:var(--ink-3)">'+ccount+' applicant(s)</td>'
        +'<td>'+(rec?esc(rec.name):'')+'</td>'
        +'<td style="white-space:nowrap">'
        +'<button class="btn btn-ghost btn-sm" onclick="openJobModal(\''+j.id+'\')">Edit</button>&nbsp;'
        +(j.status==='draft'?'<button class="btn btn-red btn-sm" onclick="publishJob(\''+j.id+'\')">Publish</button>':'<button class="btn btn-ghost btn-sm" onclick="unpublish(\''+j.id+'\')">Unpublish</button>')
        +'</td>'
        +'</tr>';
    }).join('');
    document.getElementById('mainContent').innerHTML =
      statsHTML()
      +'<div class="card">'
      +'<div class="card-head"><h2>All Job Postings</h2>'
      +'<input style="padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.8rem;font-family:var(--font-ui);width:220px" placeholder="Search postings..." oninput="filterJobs(this.value)">'
      +'</div>'
      +'<table>'
      +'<thead><tr><th>Position</th><th>Department</th><th>Location</th><th>HC</th><th>Status</th><th>Applications</th><th>Recruiter</th><th>Actions</th></tr></thead>'
      +'<tbody id="jobRows">'+rows+'</tbody>'
      +'</table></div>';
  }

  window.filterJobs = function(q){
    var rows = document.querySelectorAll('#jobRows tr');
    rows.forEach(function(r){
      r.style.display = r.textContent.toLowerCase().indexOf(q.toLowerCase())>=0 ? '' : 'none';
    });
  };

  window.publishJob = function(id){
    var j = allJobs.find(function(x){return x.id===id;});
    if(j){ j.status='open'; renderView(); showToast('Job published: '+j.title); }
  };
  window.unpublish = function(id){
    var j = allJobs.find(function(x){return x.id===id;});
    if(j){ j.status='draft'; renderView(); showToast('Job moved to draft: '+j.title); }
  };

  // ─── ALL CANDIDATES ───
  function renderCandidates(){
    var rows = allCandidates.map(function(c){
      var job = allJobs.find(function(j){return j.id===c.job_id;});
      var stage = getStageInfo(c.stage);
      return '<tr>'
        +'<td><div style="font-weight:600">'+esc(c.name)+'</div><div style="font-size:.73rem;color:var(--ink-3)">'+esc(c.email)+'</div></td>'
        +'<td>'+(job?esc(job.title):'')+'</td>'
        +'<td><span class="badge" style="background:'+stage.color+'22;color:'+stage.color+'">'+stage.label+'</span></td>'
        +'<td style="font-family:var(--font-mono)">'+c.score_fit+'%</td>'
        +'<td>'+(c.flk_complete?'<span class="badge badge-green">Complete</span>':'<span class="badge badge-amber">Pending</span>')+'</td>'
        +'<td style="font-size:.78rem;color:var(--ink-3)">'+timeAgo(c.applied_at)+'</td>'
        +'</tr>';
    }).join('');
    document.getElementById('mainContent').innerHTML =
      statsHTML()
      +'<div class="card">'
      +'<div class="card-head"><h2>All Applications</h2>'
      +'<input style="padding:7px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.8rem;font-family:var(--font-ui);width:220px" placeholder="Search..." oninput="filterCands(this.value)">'
      +'</div>'
      +'<table>'
      +'<thead><tr><th>Candidate</th><th>Applied for</th><th>Stage</th><th>Fit</th><th>FLK</th><th>Applied</th></tr></thead>'
      +'<tbody id="candRows">'+rows+'</tbody>'
      +'</table></div>';
  }

  window.filterCands = function(q){
    document.querySelectorAll('#candRows tr').forEach(function(r){
      r.style.display = r.textContent.toLowerCase().indexOf(q.toLowerCase())>=0 ? '' : 'none';
    });
  };

  // ─── SITE SETTINGS ───
  function renderSettings(){
    document.getElementById('mainContent').innerHTML =
      '<div class="card" style="max-width:620px">'
      +'<div class="card-head"><h2>Career Site Settings</h2></div>'
      +'<div style="padding:24px">'
      +'<div class="sec-head">Site Content</div>'
      +'<div class="field"><label>Hero headline (EN)</label><input type="text" value="Build a career you are proud of"></div>'
      +'<div class="field"><label>Hero sub-headline</label><input type="text" value="More than 32,000 people across 15 countries."></div>'
      +'<div class="field"><label>Company description</label><textarea>Nabati Group is a vertically integrated business group with 10 business units spanning FMCG, Quick Service Restaurants, e-commerce, logistics, digital entertainment, and property.</textarea></div>'
      +'<div class="sec-head">TASTE Values Display</div>'
      +['Trustworthy','Achiever','Super Team','Totally Customer','Excellent'].map(function(v,i){
        var descs=['Menjadi pribadi yang terpercaya','Menjadi individu berprestasi yang unggul','Membangun kerja sama tim yang solid','Berorientasi penuh melayani pelanggan','Selalu memberikan hasil kerja terbaik'];
        return '<div class="field"><label>'+v+'</label><input type="text" value="'+descs[i]+'"></div>';
      }).join('')
      +'<div class="sec-head">Notifications</div>'
      +'<div class="field"><label>New application alert email</label><input type="email" value="ta.team@nabatisnack.co.id"></div>'
      +'<div class="field"><label>Auto-reply: application received (EN)</label><textarea rows="3">Thank you for applying to Nabati Group. We have received your application and will be in touch within 5-7 business days.</textarea></div>'
      +'<div style="margin-top:20px;display:flex;gap:10px">'
      +'<button class="btn btn-ghost" onclick="showToast(\'No changes made.\')">Discard</button>'
      +'<button class="btn btn-red" onclick="showToast(\'Settings saved.\')">Save settings</button>'
      +'</div>'
      +'</div></div>';
  }

  // ─── JOB MODAL ───
  window.openJobModal = function(id){
    editingJob = id ? allJobs.find(function(j){return j.id===id;}) : null;
    var j = editingJob || {};
    document.getElementById('modalTitle').textContent = id ? 'Edit: '+esc(j.title||'') : 'New Job Posting';
    document.getElementById('modalBody').innerHTML =
      '<div class="two">'
      +'<div class="field"><label>Job title <span class="req">*</span></label><input id="jTitle" type="text" value="'+esc(j.title||'')+'" placeholder="e.g. Sales Supervisor"></div>'
      +'<div class="field"><label>MPN ID</label><input id="jMPN" type="text" value="'+esc(j.mpn_id||'')+'" placeholder="MPN-2026-XXXX"></div>'
      +'</div>'
      +'<div class="two">'
      +'<div class="field"><label>Department <span class="req">*</span></label><select id="jDept"><option value="">Select</option><option '+(j.department==='Sales and Distribution'?'selected':'')+'>Sales and Distribution</option><option '+(j.department==='Manufacturing'?'selected':'')+'>Manufacturing</option><option '+(j.department==='Supply Chain'?'selected':'')+'>Supply Chain</option><option '+(j.department==='Human Capital'?'selected':'')+'>Human Capital</option><option '+(j.department==='Technology'?'selected':'')+'>Technology</option><option '+(j.department==='Finance'?'selected':'')+'>Finance</option></select></div>'
      +'<div class="field"><label>Category</label><select id="jCat"><option value="sales" '+(j.category==='sales'?'selected':'')+'>Sales and Distribution</option><option value="manufacturing" '+(j.category==='manufacturing'?'selected':'')+'>Manufacturing</option><option value="supply_chain" '+(j.category==='supply_chain'?'selected':'')+'>Supply Chain</option><option value="corporate" '+(j.category==='corporate'?'selected':'')+'>Corporate</option><option value="technology" '+(j.category==='technology'?'selected':'')+'>Technology</option></select></div>'
      +'</div>'
      +'<div class="two">'
      +'<div class="field"><label>Location <span class="req">*</span></label><input id="jLoc" type="text" value="'+esc(j.location||'')+'" placeholder="Bandung, Indonesia"></div>'
      +'<div class="field"><label>Country</label><select id="jCountry"><option value="ID" '+(j.country==='ID'?'selected':'')+'>Indonesia</option><option value="MY" '+(j.country==='MY'?'selected':'')+'>Malaysia</option><option value="CN" '+(j.country==='CN'?'selected':'')+'>China</option><option value="PH" '+(j.country==='PH'?'selected':'')+'>Philippines</option><option value="IN" '+(j.country==='IN'?'selected':'')+'>India</option></select></div>'
      +'</div>'
      +'<div class="two">'
      +'<div class="field"><label>Level</label><select id="jLevel"><option '+(j.level==='Staff'?'selected':'')+'>Staff</option><option '+(j.level==='Officer'?'selected':'')+'>Officer</option><option '+(j.level==='Supervisor'?'selected':'')+'>Supervisor</option><option '+(j.level==='Manager'?'selected':'')+'>Manager</option></select></div>'
      +'<div class="field"><label>Grade</label><select id="jGrade"><option value="3A" '+(j.grade==='3A'?'selected':'')+'>3A - Staff</option><option value="3B" '+(j.grade==='3B'?'selected':'')+'>3B - Foreman/Officer</option><option value="3C" '+(j.grade==='3C'?'selected':'')+'>3C - Officer</option><option value="4A" '+(j.grade==='4A'?'selected':'')+'>4A - Specialist</option><option value="4B" '+(j.grade==='4B'?'selected':'')+'>4B - Supervisor</option><option value="4C" '+(j.grade==='4C'?'selected':'')+'>4C - Asst Manager</option><option value="5A" '+(j.grade==='5A'?'selected':'')+'>5A - Manager</option><option value="5B" '+(j.grade==='5B'?'selected':'')+'>5B - Senior Manager</option></select></div>'
      +'</div>'
      +'<div class="two">'
      +'<div class="field"><label>Headcount needed</label><input id="jHC" type="number" value="'+(j.headcount||1)+'" min="1"></div>'
      +'<div class="field"><label>Application deadline</label><input id="jDeadline" type="date" value="'+esc(j.deadline||'')+'"></div>'
      +'</div>'
      +'<div class="field"><label>Assign recruiter</label><select id="jRec"><option value="REC-001" '+(j.recruiter_id==='REC-001'?'selected':'')+'>Ratna Suminar</option><option value="REC-002" '+(j.recruiter_id==='REC-002'?'selected':'')+'>Stella Sondjaja</option><option value="REC-003" '+(j.recruiter_id==='REC-003'?'selected':'')+'>Syifa Ramadhani</option><option value="REC-004" '+(j.recruiter_id==='REC-004'?'selected':'')+'>Madyasti Putri</option></select></div>'
      +'<div class="sec-head">Job Content</div>'
      +'<div class="field"><label>Summary <span class="req">*</span></label><textarea id="jSummary" rows="3">'+esc(j.summary||'')+'</textarea></div>'
      +'<div class="field"><label>Responsibilities (one per line)</label><textarea id="jResp" rows="5">'+esc((j.responsibilities||[]).join('\n'))+'</textarea></div>'
      +'<div class="field"><label>Qualifications (one per line)</label><textarea id="jQual" rows="5">'+esc((j.qualifications||[]).join('\n'))+'</textarea></div>';
    document.getElementById('jobModal').classList.add('open');
  };

  window.closeModal = function(){
    document.getElementById('jobModal').classList.remove('open');
    editingJob = null;
  };

  window.saveJob = function(status){
    var title = document.getElementById('jTitle').value.trim();
    if(!title){ showToast('Job title is required.'); return; }
    var job = Object.assign(editingJob||{}, {
      title: title,
      mpn_id: document.getElementById('jMPN').value,
      department: document.getElementById('jDept').value,
      category: document.getElementById('jCat').value,
      location: document.getElementById('jLoc').value,
      country: document.getElementById('jCountry').value,
      level: document.getElementById('jLevel').value,
      grade: document.getElementById('jGrade').value,
      headcount: parseInt(document.getElementById('jHC').value)||1,
      deadline: document.getElementById('jDeadline').value,
      recruiter_id: document.getElementById('jRec').value,
      summary: document.getElementById('jSummary').value,
      responsibilities: document.getElementById('jResp').value.split('\n').filter(Boolean),
      qualifications: document.getElementById('jQual').value.split('\n').filter(Boolean),
      status: status
    });
    apiSaveJob(job, function(err, saved){
      if(err){ showToast('Save failed.'); return; }
      if(!editingJob) allJobs.unshift(saved);
      closeModal();
      renderView();
      showToast(status==='open'?'Job published: '+saved.title:'Draft saved: '+saved.title);
    });
  };

  function showToast(msg){
    var t=document.getElementById('toast');
    t.textContent=msg;t.classList.add('show');
    setTimeout(function(){t.classList.remove('show');},2800);
  }
  window.showToast = showToast;
  function esc(v){ return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
})();
</script>
</body>
</html>
