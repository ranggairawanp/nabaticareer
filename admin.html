:root{--surface:#fff;--surface-2:#f7f8fa;--surface-3:#eef1f5;--border:#e6e9ef;--border-strong:#d4dae3;
--ink:#171a1f;--ink-2:#525a67;--ink-3:#8b94a3;--n400:#aeb6c2;
--primary:#e1231b;--primary-700:#b8141a;--primary-600:#cf1a18;--primary-tint:#fceceb;--primary-tint-2:#f9dad7;
--accent:#1f242c;--success:#1f9d57;--success-tint:#e6f5ec;--warning:#c47d10;--warning-tint:#faeed4;--info:#2563c9;--info-tint:#e7effb;
--font-display:"Bricolage Grotesque",system-ui,sans-serif;--font-ui:"Geist",system-ui,sans-serif;--font-num:"Geist Mono",ui-monospace,monospace;
--r-sm:9px;--r-md:13px;--r-lg:18px;--e1:0 1px 2px rgba(23,26,31,.05),0 1px 3px rgba(23,26,31,.04);--e2:0 6px 16px -6px rgba(23,26,31,.14),0 2px 6px rgba(23,26,31,.05);--e3:0 18px 40px -16px rgba(23,26,31,.22)}
*{box-sizing:border-box}html{scroll-behavior:smooth}
body{margin:0;font-family:var(--font-ui);font-size:15px;line-height:1.55;color:var(--ink);background:var(--surface);-webkit-font-smoothing:antialiased}
h1,h2,h3,h4{font-family:var(--font-display);margin:0;letter-spacing:-.02em;line-height:1.1}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}
a{color:inherit;text-decoration:none}button{font-family:inherit;cursor:pointer}::selection{background:var(--primary);color:#fff}
img{max-width:100%;display:block}
.wrap{max-width:1180px;margin:0 auto;padding:0 clamp(16px,3vw,34px)}
::selection{background:var(--primary);color:#fff}
img{max-width:100%;display:block}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--ink);background:var(--surface);border:1px solid var(--border-strong);border-radius:var(--r-sm);padding:9px 11px;outline:none;width:100%}
input:focus,select:focus,textarea:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint)}
label{display:block;font-size:12px;font-weight:600;color:var(--ink-2);margin:0 0 5px}
.field{margin-bottom:13px}
.two{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border-radius:var(--r-sm);padding:9px 15px;font-weight:600;font-size:13px;font-family:inherit;border:1px solid transparent;cursor:pointer;white-space:nowrap;transition:.13s}
.btn svg{width:15px;height:15px;flex:none}
.btn-r{background:var(--primary);color:#fff}
.btn-r:hover{background:var(--primary-700)}
.btn-g{background:var(--surface);color:var(--ink-2);border-color:var(--border-strong)}
.btn-g:hover{border-color:var(--ink-3);color:var(--ink)}
.btn-sm{padding:6px 11px;font-size:12px}
.btn-block{width:100%}
.num{font-family:var(--font-num);font-variant-numeric:tabular-nums}
/* shell */
.topbar{position:sticky;top:0;z-index:40;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:11px clamp(16px,3vw,34px);background:rgba(255,255,255,.86);backdrop-filter:saturate(1.6) blur(12px);border-bottom:1px solid var(--border);transition:box-shadow .2s ease}.topbar.scrolled{box-shadow:0 6px 22px -14px rgba(23,26,31,.3)}
.brand{display:flex;align-items:center;gap:10px}
.brand img{height:30px;width:auto}
.brand .bt{font-family:var(--font-display);font-weight:800;font-size:15px;line-height:1}
.brand .bs{font-size:10.5px;color:var(--ink-3);font-family:var(--font-num);letter-spacing:.04em}
.tnav{display:flex;gap:3px;margin-left:8px}
.tnav button{border:none;background:none;font-family:inherit;font-size:13px;font-weight:600;color:var(--ink-3);padding:7px 13px;border-radius:8px;cursor:pointer}
.tnav button:hover{background:var(--surface-2);color:var(--ink-2)}
.tnav button.on{background:var(--primary-tint);color:var(--primary-700)}
.tright{display:flex;align-items:center;gap:10px;margin-left:auto}
.lang{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lang button{border:none;background:none;font-family:var(--font-num);font-size:11px;font-weight:700;color:var(--ink-3);padding:5px 9px;cursor:pointer}
.lang button.on{background:var(--accent);color:#fff}
.page{padding:26px 0 70px}
.h1{font-family:var(--font-display);font-size:25px;font-weight:800;letter-spacing:-.02em;margin:0 0 3px}
.sub{color:var(--ink-3);font-size:13.5px;margin:0 0 22px}
/* kpi */
.kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:13px;margin-bottom:26px}
@media(max-width:760px){.kpis{grid-template-columns:1fr 1fr}.two{grid-template-columns:1fr}}
.kpi{border:1px solid var(--border);border-radius:var(--r-md);padding:15px 16px;background:var(--surface);box-shadow:var(--e1)}
.kpi .v{font-family:var(--font-num);font-size:27px;font-weight:600;color:var(--ink);letter-spacing:-.02em}
.kpi .l{font-size:12px;color:var(--ink-3);margin-top:2px}
.kpi.red .v{color:var(--primary)}
/* table */
.card{border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);box-shadow:var(--e1);overflow:hidden}
.cardhead{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:14px 16px;border-bottom:1px solid var(--border)}
.cardhead h3{font-family:var(--font-display);font-size:15px;margin:0}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:var(--ink-3);font-weight:700;padding:10px 16px;background:var(--surface-2);border-bottom:1px solid var(--border)}
td{padding:11px 16px;border-bottom:1px solid var(--border);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr.rowlink:hover td{background:var(--surface-2);cursor:pointer}
.pill{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;border-radius:999px;padding:3px 9px}
.pill.pub{background:var(--success-tint);color:#176b3c}
.pill.draft{background:var(--surface-3);color:var(--ink-2)}
.pill.s0{background:var(--info-tint);color:#1d4f9e}
.pill.s1{background:var(--warning-tint);color:#7a5a13}
.pill.s2{background:#ede8fb;color:#5b3da8}
.pill.s3{background:var(--success-tint);color:#176b3c}
.pill.sw{background:var(--surface-3);color:var(--ink-2)}
.rowact{display:flex;gap:6px;justify-content:flex-end}
.tag{display:inline-block;font-size:11px;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--border);border-radius:6px;padding:2px 7px;font-family:var(--font-num)}
/* form */
.formwrap{display:grid;grid-template-columns:1fr;gap:0;max-width:780px}
.fsec{border:1px solid var(--border);border-radius:var(--r-md);background:var(--surface);box-shadow:var(--e1);padding:18px;margin-bottom:16px}
.fsec h4{font-family:var(--font-display);font-size:14px;margin:0 0 14px;display:flex;align-items:center;gap:8px}
.rowline{display:grid;grid-template-columns:1fr 1fr auto;gap:10px;align-items:center;margin-bottom:9px}
.rowline .x{border:1px solid var(--border-strong);background:var(--surface);border-radius:8px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--ink-3);flex:none}
.rowline .x:hover{border-color:var(--primary);color:var(--primary)}
.addrow{font-size:12.5px;font-weight:600;color:var(--primary-700);background:none;border:1px dashed var(--primary-tint-2);border-radius:8px;padding:7px 12px;cursor:pointer;font-family:inherit}
.addrow:hover{background:var(--primary-tint)}
.formbar{display:flex;gap:10px;justify-content:flex-end;position:sticky;bottom:0;background:linear-gradient(180deg,transparent,var(--surface-2) 40%);padding:16px 0 4px;margin-top:4px}
.toggle{display:inline-flex;align-items:center;gap:9px;cursor:pointer;font-size:13px;font-weight:600;color:var(--ink-2)}
.toggle input{width:auto}
.note{display:flex;gap:9px;font-size:12.5px;color:var(--ink-2);background:var(--info-tint);border:1px solid #cfe0fb;border-radius:var(--r-sm);padding:10px 12px;line-height:1.5}
.note svg{width:16px;height:16px;flex:none;color:var(--info);margin-top:1px}
/* login */
.login{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:radial-gradient(1200px 500px at 50% -10%,var(--primary-tint),transparent)}
.logincard{width:100%;max-width:380px;border:1px solid var(--border);border-radius:var(--r-lg);background:var(--surface);box-shadow:var(--e3);padding:28px}
.logincard .brand{justify-content:center;margin-bottom:18px}
.logincard h1{font-family:var(--font-display);font-size:21px;text-align:center;margin:0 0 4px}
.logincard p{text-align:center;color:var(--ink-3);font-size:13px;margin:0 0 20px}
.lasterr{color:var(--primary-700);font-size:12.5px;margin-top:9px;min-height:16px}
/* app detail */
.appgrid{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}
@media(max-width:820px){.appgrid{grid-template-columns:1fr}.appgrid2{grid-template-columns:1fr}}
.stagebtns{display:flex;flex-wrap:wrap;gap:7px}
.stagebtns button{border:1px solid var(--border-strong);background:var(--surface);border-radius:8px;padding:7px 12px;font-size:12.5px;font-weight:600;font-family:inherit;cursor:pointer;color:var(--ink-2)}
.stagebtns button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
.divline{height:1px;background:var(--border);margin:16px 0}
.toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(14px);background:var(--accent);color:#fff;padding:11px 18px;border-radius:10px;font-size:13px;font-weight:600;opacity:0;pointer-events:none;transition:.22s;z-index:90}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.back{display:inline-flex;align-items:center;gap:6px;font-size:13px;font-weight:600;color:var(--ink-3);cursor:pointer;margin-bottom:14px}
.back:hover{color:var(--primary-700)}
.back svg{width:15px;height:15px}
@media(prefers-reduced-motion:reduce){*{transition:none!important;animation:none!important}}
/* ===== responsive admin ===== */
@media(max-width:760px){
 .topbar{flex-wrap:wrap;gap:8px 12px;padding:9px clamp(14px,3vw,20px)}
 .topbar .brand small{display:none}
 .tnav{order:3;width:100%;margin-left:0;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
 .tnav button{white-space:nowrap}
 .card table,.card thead,.card tbody,.card tr,.card td{display:block}
 .card thead{display:none}
 .card tr{padding:10px 0;border-bottom:1px solid var(--border)}
 .card tr:last-child{border-bottom:none}
 .card td{border:none;padding:4px 16px}
 .card td:first-child{padding-top:8px}
 .card td:last-child{padding-bottom:10px}
 .card td::before{content:attr(data-label);display:block;font-size:10.5px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink-3);font-weight:700;margin-bottom:2px}
 .rowact{justify-content:flex-start;flex-wrap:wrap;gap:6px}
}
@media(max-width:560px){
 .rowline{grid-template-columns:1fr;gap:7px}
 .h1{font-size:22px}

 +'<div class="fsec"><h4>'+L('jf_resp')+'</h4>'+rowsHTML(F.resp,'r')+'<button class="addrow" onclick="addRow(\'r\')">+ '+L('add_resp')+'</button></div>'
 +'<div class="fsec"><h4>'+L('jf_qual')+'</h4>'+rowsHTML(F.qual,'q')+'<button class="addrow" onclick="addRow(\'q\')">+ '+L('add_resp')+'</button></div>'
 +'<div class="formbar"><button class="btn btn-g" onclick="go(\'jobs\')">'+L('cancel')+'</button><button class="btn btn-r" onclick="saveJob()">'+L('save')+'</button></div>'
 +'</div></div>';
}
function syncForm(){
 F.id=el('jf_id').value.trim();F.t0=el('jf_t0').value;F.t1=el('jf_t1').value;
 F.cat=el('jf_cat').value;F.country=el('jf_country').value;F.c0=el('jf_c0').value;F.c1=el('jf_c1').value;
 F.type=el('jf_type').value;F.lvl=el('jf_lvl').value;F.date=el('jf_date').value;
 F.s0=el('jf_s0').value;F.s1=el('jf_s1').value;F.status=el('jf_status').checked?'published':'draft';
 F.resp=F.resp.map(function(_,i){return [el('jf_r_'+i+'_0').value,el('jf_r_'+i+'_1').value];});
 F.qual=F.qual.map(function(_,i){return [el('jf_q_'+i+'_0').value,el('jf_q_'+i+'_1').value];});
}
function addRow(p){syncForm();(p==='r'?F.resp:F.qual).push(['','']);render();}
function rmRow(p,i){syncForm();var a=(p==='r'?F.resp:F.qual);a.splice(i,1);if(!a.length)a.push(['','']);render();}
function genId(cat){return 'NAB-'+(cat||'GEN').slice(0,2).toUpperCase()+'-'+Math.floor(2300+Math.random()*699);}
function saveJob(){syncForm();if(!F.t0||!F.t1){toast(L('need_title'));return;}
 var ne=function(r){return (r[0]||'').trim()||(r[1]||'').trim();};
 var job={id:F.id||genId(F.cat),t:[F.t0,F.t1],cat:F.cat,country:F.country,city:[F.c0||F.c1,F.c1||F.c0],type:F.type,lvl:F.lvl,date:F.date||today(),status:F.status,sum:[F.s0,F.s1],resp:F.resp.filter(ne),qual:F.qual.filter(ne)};
 var a=jobs();var idx=a.findIndex(function(x){return x.id===job.id;});if(idx>=0)a[idx]=job;else a.push(job);setJobs(a);toast(L('saved_ok'));go('jobs');}
function delJob(id){if(!confirm(L('del_confirm')))return;setJobs(jobs().filter(function(x){return x.id!==id;}));render();}
function togglePub(id){var a=jobs();var j=a.find(function(x){return x.id===id;});if(j){j.status=j.status==='published'?'draft':'published';setJobs(a);render();}}
function parseJD(){var t=el('jf_paste').value;if(!t.trim())return;
 var lines=t.split(/\r?\n/).map(function(x){return x.trim();}).filter(Boolean);
 var sum=[],resp=[],qual=[],mode='sum';
 lines.forEach(function(ln){var low=ln.toLowerCase();
  if(/tanggung jawab|responsibilit|tugas|job desc/.test(low)){mode='resp';return;}
  if(/kualifikasi|qualificat|persyaratan|requirement/.test(low)){mode='qual';return;}
  var clean=ln.replace(/^[-*\u2022\d.\)\s]+/,'').trim();if(!clean)return;
  if(mode==='sum')sum.push(clean);else if(mode==='resp')resp.push(clean);else qual.push(clean);});
 syncForm();
 if(sum.length){F.s0=sum.join(' ');F.s1=F.s1||sum.join(' ');}
 if(resp.length)F.resp=resp.map(function(x){return [x,x];});
 if(qual.length)F.qual=qual.map(function(x){return [x,x];});
 render();toast(L('parsed_ok'));}
function exportJobs(){var pub=jobs().filter(function(j){return j.status==='published';}).map(function(j){var c={id:j.id,t:j.t,cat:j.cat,city:j.city,country:j.country,type:j.type,lvl:j.lvl,date:j.date,sum:j.sum,resp:j.resp,qual:j.qual};return c;});
 var blob=new Blob([JSON.stringify(pub,null,2)],{type:'application/json'});var u=URL.createObjectURL(blob);var a=document.createElement('a');a.href=u;a.download='nabati-jobs.json';document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(u);}
function importJobs(file){var rd=new FileReader();rd.onload=function(){try{var arr=JSON.parse(rd.result);if(!Array.isArray(arr))throw 0;arr.forEach(function(j){if(j.status==null)j.status='published';});setJobs(arr);toast(L('imported_ok'));render();}catch(e){toast(L('import_err'));}};rd.readAsText(file);}

var SN=[["Lamaran diterima","Application received"],["Sedang ditinjau","Under review"],["Tahap wawancara","Interview stage"],["Keputusan akhir","Final decision"]];
function seenSet(){try{var a=JSON.parse(localStorage.getItem('nabAdminSeen')||'[]');return Array.isArray(a)?a:[];}catch(e){return [];}}
function setSeen(a){try{localStorage.setItem('nabAdminSeen',JSON.stringify(a));}catch(e){}}
function isNew(no){return seenSet().indexOf(no)<0;}
function newPill(no){return isNew(no)?' <span class="pill new">'+L('new_tag')+'</span>':'';}
function newCount(){var ap=apps();var sn=seenSet();return Object.keys(ap).filter(function(k){return sn.indexOf(k)<0;}).length;}
function markSeen(no){var s=seenSet();if(s.indexOf(no)<0){s.push(no);setSeen(s);}}
function notifyCandidate(no,t,b){try{var a=JSON.parse(localStorage.getItem('nabInbox')||'[]');if(!Array.isArray(a))a=[];a.unshift({id:'n'+Date.now()+Math.floor(Math.random()*99),type:'stage',t:t,b:b,when:fmtD(new Date().toISOString().slice(0,10)),read:false,go:'status',no:no});localStorage.setItem('nabInbox',JSON.stringify(a));}catch(e){}}
function openApp(no){markSeen(no);appNo=no;go('appdetail');}
function setStage(s){var o=apps();var r=o[appNo];if(!r)return;r.stage=s;if(s!==3)delete r.outcome;setApps(o);if(SN[s])notifyCandidate(appNo,["Status lamaran diperbarui","Application status updated"],["Tahap saat ini: "+SN[s][0],"Current stage: "+SN[s][1]]);toast(L('stage_saved'));render();}
function setOutcome(oc){var o=apps();var r=o[appNo];if(!r)return;r.stage=3;r.outcome=oc;setApps(o);notifyCandidate(appNo,oc==='offer'?["Kabar baik tentang lamaran Anda","Good news about your application"]:["Pembaruan lamaran Anda","Update on your application"],oc==='offer'?["Anda menerima penawaran. Silakan cek detailnya.","You received an offer. Please check the details."]:(oc==='not_selected'?["Mohon maaf, Anda belum lolos kali ini.","We are sorry, you were not selected this time."]:["Lamaran Anda sedang dipertimbangkan.","Your application is under consideration."]));toast(L('outcome_saved'));render();}
function saveIv(){var o=apps();var r=o[appNo];if(!r)return;var d=el('iv_date').value,t=el('iv_time').value,m=el('iv_mode').value;
 if(!d||!t){return;}var start=d.replace(/-/g,'')+'T'+t.replace(':','')+'00';
 r.interview={date:fmtD(d),time:t+' WIB',start:start,mode:[m||'Daring',m||'Online']};if(r.stage<2)r.stage=2;delete r.interviewConfirmed;setApps(o);notifyCandidate(appNo,["Undangan wawancara","Interview invitation"],["Wawancara dijadwalkan: "+r.interview.date+" "+r.interview.time+".","Interview scheduled: "+r.interview.date+" "+r.interview.time+"."]);toast(L('iv_saved'));render();}
function addDoc(){var o=apps();var r=o[appNo];if(!r)return;var v=el('doc_in').value.trim();if(!v)return;r.docs=(r.docs||[]).concat([[v,v]]);if(r.stage<2)r.stage=2;setApps(o);render();}
function rmDoc(i){var o=apps();var r=o[appNo];if(!r||!r.docs)return;r.docs.splice(i,1);setApps(o);render();}
function renderAppDetail(){
 var r=apps()[appNo];if(!r)return renderApps();
 var sbtn=STG.map(function(s,i){return '<button class="'+(r.stage===i?'on':'')+'" onclick="setStage('+i+')">'+TX(s)+'</button>';}).join('')+'<button class="'+(r.stage===-1?'on':'')+'" onclick="setStage(-1)">'+L('withdrawn')+'</button>';
 var ob='';if(r.stage===3){ob='<div class="divline"></div><label>'+L('ad_outcome')+'</label><div class="stagebtns"><button class="'+(r.outcome==='offer'?'on':'')+'" onclick="setOutcome(\'offer\')">'+L('set_offer')+'</button><button class="'+(r.outcome==='not_selected'?'on':'')+'" onclick="setOutcome(\'not_selected\')">'+L('set_not')+'</button></div>';}
 var iv=r.interview?('<div class="tag" style="display:block;padding:8px 10px;line-height:1.6">'+esc(r.interview.date)+' &middot; '+esc(r.interview.time)+'<br>'+esc(TX(r.interview.mode))+(r.interviewConfirmed?' &middot; <b style="color:var(--success)">'+L('cand_iv_confirmed')+'</b>':'')+'</div>'):('<div style="color:var(--ink-3);font-size:12.5px;margin-bottom:10px">'+L('iv_none')+'</div>');

 var ct=r.consent;var cons;function _crow(ok,lab){return '<div class="crow"><span class="cdot '+(ok?'on':'')+'">'+(ok?'✓':'·')+'</span>'+lab+'</div>';}if(ct){var _w=new Date(ct.ts);var _wd=_w.getDate()+' '+MON[_w.getMonth()]+' '+_w.getFullYear();cons='<div class="fsec"><h4>'+L('ad_consent')+'</h4>'+'<div class="cmeta"><div><span>'+L('ad_country')+'</span><b>'+TX(COUNTRY[ct.country]||[ct.country,ct.country])+'</b></div>'+'<div><span>'+L('ad_law')+'</span><b class="num">'+esc(ct.law)+'</b></div>'+'<div><span>'+L('ad_consent_when')+'</span><b>'+_wd+'</b></div>'+'<div><span>'+L('ad_consent_lang')+'</span><b>'+esc((ct.lang||'').toUpperCase())+'</b></div></div>'+_crow(ct.process,L('ad_c_process'))+_crow(ct.alerts,L('ad_c_alerts'))+_crow(ct.pool,L('ad_c_pool'))+(ct.china?_crow(true,L('ad_c_china')):'')+(ct.china?'<div style="margin-top:8px;background:var(--info-tint);border:1px solid var(--info);border-radius:8px;padding:8px 10px;font-size:12px;color:var(--ink-2)">'+L('ad_cn_note')+'</div>':'')+'</div>';}else{cons='<div class="fsec"><h4>'+L('ad_consent')+'</h4><div style="color:var(--ink-3);font-size:12.5px">'+L('ad_consent_none')+'</div></div>';}
 return chrome()+'<div class="wrap page"><div class="back" onclick="go(\'apps\')">&larr; '+L('ad_back')+'</div>'
  +'<h1 class="h1">'+TX(r.role)+'</h1><p class="sub"><span class="num">'+appNo+'</span> &middot; '+esc(r.email||'')+' &middot; '+pillStage(r)+'</p>'

}

function render(){

 var h;
