<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in - Nabati Careers</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Schibsted+Grotesk:wght@400;500;600;700;800&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --surface:#fff;--surface-2:#f7f8fa;--surface-3:#eef1f5;
  --border:#e6e9ef;--border-strong:#d4dae3;
  --ink:#171a1f;--ink-2:#525a67;--ink-3:#8b94a3;--n400:#aeb6c2;
  --red:#e1231b;--primary:#e1231b;--primary-700:#b8141a;--primary-tint:#fceceb;--primary-tint-2:#f9dad7;
  --success:#1f9d57;
  --font-display:'Schibsted Grotesk','Noto Sans',system-ui,sans-serif;
  --font-ui:'Geist','Noto Sans',system-ui,sans-serif;
  --radius:13px;--r-sm:9px;
  --e1:0 1px 2px rgba(23,26,31,.05),0 1px 3px rgba(23,26,31,.04);
  --e3:0 18px 40px -16px rgba(23,26,31,.22);
}
body{font-family:var(--font-ui);background:radial-gradient(120% 80% at 50% -10%,var(--primary-tint) 0%,var(--surface-2) 46%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;-webkit-font-smoothing:antialiased}
.card{background:#fff;border:1px solid var(--border);border-radius:22px;width:100%;max-width:432px;padding:38px 36px;box-shadow:var(--e3)}
.brand{display:flex;align-items:center;gap:9px;margin-bottom:28px;justify-content:center}
.brand img{height:26px;display:block}
.brand-name{font-family:var(--font-display);font-weight:800;font-size:1.05rem;color:var(--ink)}
.brand-sub{font-size:.62rem;color:var(--ink-3);font-weight:400;letter-spacing:.02em}
h1{font-family:var(--font-display);font-weight:800;font-size:1.5rem;color:var(--ink);text-align:center;margin-bottom:6px;letter-spacing:-.02em}
.sub{color:var(--ink-3);font-size:.875rem;text-align:center;margin-bottom:26px;line-height:1.5}
.social-btn{width:100%;display:flex;align-items:center;justify-content:center;gap:10px;padding:13px 16px;border:1.5px solid var(--border-strong);border-radius:var(--r-sm);background:#fff;font-family:var(--font-ui);font-size:.9rem;font-weight:600;color:var(--ink);cursor:pointer;transition:.15s;margin-bottom:11px}
.social-btn:hover{border-color:var(--ink-3);box-shadow:var(--e1)}
.social-btn svg{flex-shrink:0}
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;color:var(--ink-3);font-size:.78rem}
.divider:before,.divider:after{content:'';flex:1;height:1px;background:var(--border)}
.field{margin-bottom:15px}
.field label{display:block;font-size:.78rem;font-weight:600;color:var(--ink-2);margin-bottom:6px}
.field input{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);font-family:var(--font-ui);font-size:.9rem;color:var(--ink);transition:border-color .15s,box-shadow .15s}
.field input::placeholder{color:var(--n400)}
.field input:hover{border-color:var(--border-strong)}
.field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-tint)}
.btn-primary{width:100%;padding:13px;background:var(--primary);color:#fff;border:none;border-radius:var(--r-sm);font-family:var(--font-display);font-size:.95rem;font-weight:700;cursor:pointer;box-shadow:0 2px 8px -2px rgba(225,35,27,.4);transition:.16s;margin-top:6px}
.btn-primary:hover{background:var(--primary-700);transform:translateY(-1px);box-shadow:0 6px 16px -4px rgba(225,35,27,.5)}
.switch{text-align:center;font-size:.825rem;color:var(--ink-3);margin-top:20px}
.switch a{color:var(--red);font-weight:600;cursor:pointer;text-decoration:none}
.switch a:hover{text-decoration:underline}
.note{font-size:.74rem;color:var(--ink-3);text-align:center;margin-top:18px;line-height:1.55}
.note a{color:var(--red);font-weight:600}
.error-msg{background:var(--primary-tint);border:1px solid var(--primary-tint-2);border-radius:var(--r-sm);padding:10px 14px;font-size:.82rem;color:var(--primary-700);margin-bottom:16px;display:none}
.tab-row{display:flex;gap:4px;background:var(--surface-2);padding:4px;border-radius:var(--r-sm);margin-bottom:24px;border:1px solid var(--border)}
.tab{flex:1;padding:8px;text-align:center;font-size:.82rem;font-weight:600;color:var(--ink-3);border-radius:7px;cursor:pointer;transition:.15s}
.tab.active{background:#fff;color:var(--primary);box-shadow:var(--e1)}
.trust-line{display:flex;align-items:center;justify-content:center;gap:7px;font-size:.72rem;color:var(--ink-3);margin-top:18px;padding-top:16px;border-top:1px solid var(--border);line-height:1.4;text-align:center}
.trust-line svg{flex-shrink:0;color:var(--success)}
.optins{display:flex;flex-direction:column;gap:9px;margin:2px 0 14px;text-align:left}
.optin{display:flex;gap:9px;align-items:flex-start;font-size:13px;color:#525a67;cursor:pointer;line-height:1.4}
.optin input{margin-top:2px;width:16px;height:16px;flex:none;accent-color:#e1231b;cursor:pointer}
</style>
</head>

    <span><span class="brand-name">Nabati</span> <span class="brand-sub">Careers</span></span>
  </div>
  <div id="authUI"></div>
  <div class="trust-line">
    <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.9" viewBox="0 0 24 24"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="M9 12l2 2 4-4"/></svg>
    Recruitment at Nabati is always free. We never charge fees at any stage.
  </div>
</div>
<script>
(function(){
  // Check if already logged in
  if(isLoggedIn()){
    var next = new URLSearchParams(location.search).get('next') || 'index.html';
    location.href = next;
    return;
  }

  var mode = 'signup'; // 'signup' or 'login'

  function render(){
    var ui = document.getElementById('authUI');
    var isSignup = mode === 'signup';
    ui.innerHTML = ''
      + '<div class="tab-row">'
      +   '<div class="tab '+(isSignup?'active':'')+'" onclick="setMode(\'signup\')">Create account</div>'
      +   '<div class="tab '+(!isSignup?'active':'')+'" onclick="setMode(\'login\')">Sign in</div>'
      + '</div>'
      + '<h1>'+(isSignup?'Join Nabati Careers':'Welcome back')+'</h1>'
      + '<p class="sub">'+(isSignup?'Create your candidate profile to apply':'Sign in to continue your application')+'</p>'
      + '<div class="error-msg" id="errMsg"></div>'
      + '<button class="social-btn" onclick="socialAuth(\'google\')">'
      +   '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>'
      +   (isSignup?'Sign up with Google':'Continue with Google')
      + '</button>'
      + '<button class="social-btn" onclick="socialAuth(\'linkedin\')">'
      +   '<svg width="18" height="18" viewBox="0 0 24 24" fill="#0A66C2"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/></svg>'
      +   (isSignup?'Sign up with LinkedIn':'Continue with LinkedIn')
      + '</button>'
      + '<div class="divider">or with email</div>'
      + (isSignup?'<div class="field"><label>Full name</label><input id="nameInput" type="text" placeholder="As per KTP / ID"></div>':'')
      + '<div class="field"><label>Email address</label><input id="emailInput" type="email" placeholder="your@email.com"></div>'
      + '<div class="field"><label>Password</label><input id="pwInput" type="password" placeholder="Min. 8 characters"></div>'
      + (isSignup?'<div class="optins"><label class="optin"><input type="checkbox" id="optNews" checked><span>I want to receive Nabati careers news and job alerts.</span></label><label class="optin"><input type="checkbox" id="optPool" checked><span>Keep my profile in the talent pool for future opportunities.</span></label></div>':'')
      + '<button class="btn-primary" onclick="emailAuth()">'+(isSignup?'Create account':'Sign in')+'</button>'
      + '<p class="switch">'
      + (isSignup?'Already have an account? <a onclick="setMode(\'login\')">Sign in</a>':'No account yet? <a onclick="setMode(\'signup\')">Create one</a>')
      + '</p>'
      + '<p class="note">By continuing, you agree to our <a href="#">privacy policy</a>. Your data is used only for recruitment at Nabati Group.</p>';
  }

  window.setMode = function(m){ mode = m; render(); };

  window.socialAuth = function(provider){
    var name = provider === 'google' ? 'Google User' : 'LinkedIn User';
    var email = provider + '_mock@nabatigroup.demo';
    // Mock: simulate OAuth returning basic profile
    if(provider === 'linkedin'){
      // LinkedIn: pre-fill candidate profile with mock parsed data
      _setLocal('linkedin_parsed', {
        name: 'Demo Candidate',
        email: 'demo@linkedin.com',
        headline: 'Marketing Professional at PT XYZ',
        education: [{ school:'Universitas Padjadjaran', degree:'S1 Manajemen', year:2020 }],
        experience: [{ company:'PT XYZ', title:'Marketing Supervisor', start:2022, end:null }],
        skills: ['Digital Marketing','Market Analysis','Team Leadership']
      });
    }
    apiLogin({ name: name, email: email }, provider, function(err, user){
      if(err){ showErr('Authentication failed. Please try again.'); return; }
      redirect();
    });
  };

  window.emailAuth = function(){
    var email = (document.getElementById('emailInput')||{}).value || '';
    var pw = (document.getElementById('pwInput')||{}).value || '';
    var name = mode==='signup' ? ((document.getElementById('nameInput')||{}).value||'') : '';
    if(!email || !pw){ showErr('Please fill in all required fields.'); return; }
    if(pw.length < 8){ showErr('Password must be at least 8 characters.'); return; }
    var prefs={news:!!((document.getElementById('optNews')||{}).checked),pool:!!((document.getElementById('optPool')||{}).checked)};
    apiLogin({ name: name || email, email: email, password: pw }, 'email', function(err, user){
      if(err){ showErr('Sign in failed. Please check your credentials.'); return; }
      if(mode==='signup'){ try{var c=JSON.parse(localStorage.getItem('nabCandidate')||'{}');c.prefs=prefs;if(!c.name)c.name=name;if(!c.email)c.email=email;localStorage.setItem('nabCandidate',JSON.stringify(c));}catch(e){} }
      redirect();
    });
  };

  function redirect(){
    var next = new URLSearchParams(location.search).get('next') || 'index.html';
    location.href = next;
  }
  function showErr(msg){
    var el = document.getElementById('errMsg');
    if(el){ el.textContent = msg; el.style.display='block'; }
  }

  render();
})();
</script>
